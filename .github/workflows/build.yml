name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - run: go vet ./...
      - run: go test ./...

      - name: Check frontend exists
        id: frontend
        run: |
          if [ -f frontend/package-lock.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Skipping frontend build; frontend/ not yet in repo."
          fi

      - uses: actions/setup-node@v4
        if: steps.frontend.outputs.exists == 'true'
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend (sanity check)
        if: steps.frontend.outputs.exists == 'true'
        working-directory: frontend
        run: |
          npm ci
          npm run build -- --mode=production

  binary:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Check frontend exists
        id: frontend
        run: |
          if [ -f frontend/package-lock.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Skipping frontend build; frontend/ not yet in repo."
          fi

      - uses: actions/setup-node@v4
        if: steps.frontend.outputs.exists == 'true'
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        if: steps.frontend.outputs.exists == 'true'
        run: cd frontend && npm ci && npm run build -- --mode=production

      - name: Stage frontend dist for embed
        if: steps.frontend.outputs.exists == 'true'
        run: |
          mkdir -p internal/web/dist
          cp -r frontend/dist/* internal/web/dist/

      - name: Build muzika binary (arm64)
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: 0
        run: |
          go build -trimpath -ldflags="-s -w" -o muzika-linux-arm64 ./cmd/muzika
          sha256sum muzika-linux-arm64 > muzika-linux-arm64.sha256

      - name: Build muzika binary (armv7)
        env:
          GOOS: linux
          GOARCH: arm
          GOARM: '7'
          CGO_ENABLED: 0
        run: |
          go build -trimpath -ldflags="-s -w" -o muzika-linux-armv7 ./cmd/muzika
          sha256sum muzika-linux-armv7 > muzika-linux-armv7.sha256

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: muzika-binary
          path: |
            muzika-linux-arm64
            muzika-linux-arm64.sha256
            muzika-linux-armv7
            muzika-linux-armv7.sha256
          retention-days: 14
