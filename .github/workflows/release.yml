name: release

# Pushing a v* tag builds the ARM64 binary fresh and creates a GitHub Release.
# The Pi's muzika-updater.timer polls /releases/latest every 5 min and pulls
# the new binary on the next tick.
#
# Rebuilding on tag (instead of reusing a prior build artifact) adds ~2 min
# of CI time but keeps this workflow self-contained. No download-artifact
# cross-workflow plumbing.

on:
  push:
    tags: ['v*']

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Check frontend exists
        id: frontend
        run: |
          if [ -f frontend/package-lock.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Skipping frontend build; frontend/ not yet in repo."
          fi

      - uses: actions/setup-node@v4
        if: steps.frontend.outputs.exists == 'true'
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        if: steps.frontend.outputs.exists == 'true'
        run: cd frontend && npm ci && npm run build -- --mode=production

      - name: Stage frontend dist for embed
        if: steps.frontend.outputs.exists == 'true'
        run: |
          mkdir -p internal/web/dist
          cp -r frontend/dist/* internal/web/dist/

      # Build both Pi 3 targets: arm64 (64-bit Ubuntu/Raspberry Pi OS) and
      # armv7 (32-bit Ubuntu/Raspberry Pi OS — same CPU, smaller userland).
      # deploy/bin/muzika-update picks the right asset at install time via
      # `uname -m`.
      - name: Build muzika binary (arm64)
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: 0
        run: |
          go build -trimpath -ldflags="-s -w" -o muzika-linux-arm64 ./cmd/muzika
          sha256sum muzika-linux-arm64 > muzika-linux-arm64.sha256

      - name: Build muzika binary (armv7)
        env:
          GOOS: linux
          GOARCH: arm
          GOARM: '7'
          CGO_ENABLED: 0
        run: |
          go build -trimpath -ldflags="-s -w" -o muzika-linux-armv7 ./cmd/muzika
          sha256sum muzika-linux-armv7 > muzika-linux-armv7.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            muzika-linux-arm64
            muzika-linux-arm64.sha256
            muzika-linux-armv7
            muzika-linux-armv7.sha256
          generate_release_notes: true
